<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- Mobile-first viewport: prevents zoom on input focus on iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- PWA / mobile app feel -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#09081c" />
    <title>SaaS Grid - Multi-Tenant Project Management</title>
    <script>
      window.addEventListener('error', function(e) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.background = '#ef4444';
        div.style.color = '#ffffff';
        div.style.padding = '16px';
        div.style.zIndex = '999999';
        div.style.fontSize = '12px';
        div.style.fontFamily = 'monospace';
        div.style.wordBreak = 'break-all';
        div.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
        div.innerHTML = '<strong>JS Crash:</strong> ' + e.message + '<br><small>at ' + e.filename + ':' + e.lineno + '</small>';
        document.body.appendChild(div);
      });
    </script>
    <script>
      // Automatically bounce Android Gmail users out of WebView into Chrome
      var ua = navigator.userAgent || navigator.vendor || '';
      var isAndroid = /Android/i.test(ua);
      var isInApp = /FBAN|FBAV|Instagram|Twitter|WebView|wv|GSA/i.test(ua) || (isAndroid && /Version\/\d+/i.test(ua));
      
      if (isAndroid && isInApp && window.location.pathname.indexOf('/join/invite') > -1) {
        var chromeIntent = "intent://" + window.location.host + window.location.pathname + window.location.search + "#Intent;scheme=http;package=com.android.chrome;end";
        window.location.href = chromeIntent;
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Prevent text size adjust on orientation change */
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            /* Prevent overscroll bounce on iOS */
            overscroll-behavior: none;
        }
        /* Prevent horizontal scroll on mobile */
        html, body, #root {
            max-width: 100vw;
            overflow-x: hidden;
        }
        /* Better tap highlight on mobile */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        /* Smooth scrolling everywhere */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Static fallback shown ONLY if JavaScript is blocked by Gmail WebView -->
        <div style="font-family: 'Inter', sans-serif; text-align: center; padding: 40px 20px; background: #09081c; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box;">
            <div style="background: rgba(30, 27, 75, 0.4); border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 24px; padding: 32px; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(8px);">
                <div style="width: 48px; height: 48px; background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.25); color: #f59e0b; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                    <svg style="width: 24px; height: 24px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                    </svg>
                </div>
                <h2 style="font-size: 20px; margin-bottom: 12px; font-weight: 800; letter-spacing: -0.5px; color: #ffffff;">Open in System Browser</h2>
                <p style="font-size: 13px; color: #94a3b8; line-height: 1.6; margin-bottom: 24px;">
                    Google blocks verification inside mail apps. Tap the <strong style="color: #ffffff;">three dots (⋮)</strong> at the top right or the <strong style="color: #ffffff;">Share button</strong> at the bottom, and select <strong style="color: #6366f1;">"Open in Browser"</strong>.
                </p>
                <div style="font-size: 11px; color: #475569; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 16px;">
                    Or copy the link from the email and paste it directly into your Google Chrome or Safari browser.
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
