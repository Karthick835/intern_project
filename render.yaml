services:
  # Backend Web Service (Spring Boot)
  - type: web
    name: saas-grid-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: MOCK_AI
        value: "true"
      - key: FRONTEND_URL
        value: https://saas-grid-frontend.onrender.com
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://dpg-d9fqr99kh4rs73d0qj2g-a.oregon-postgres.render.com:5432/saas_pm?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: saas_pm_user
      - key: SPRING_DATASOURCE_PASSWORD
        value: Gdbi0irak2RqqcOQUNLBcD1HkTqm6buM
      - key: SPRING_DATASOURCE_DRIVER
        value: org.postgresql.Driver
      - key: SPRING_JPA_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect

  # Frontend Static Web App (Vite React)
  - type: web
    name: saas-grid-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://saas-grid-backend.onrender.com/api
      - key: VITE_WS_BASE_URL
        value: wss://saas-grid-backend.onrender.com/ws-native
